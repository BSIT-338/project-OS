<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarlnuxOS | Browser Demo</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ffcc;
            --terminal-bg: #000;
        }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--accent-color);
            letter-spacing: 2px;
            margin: 0;
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        #screen_container {
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            background: var(--terminal-bg);
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }
        canvas {
            display: block;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        button:hover {
            background: var(--accent-color);
            color: #000;
        }
        .status {
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EARLNUX OS</h1>
        <div class="subtitle">v1.0.0 "Prism" | Online Browser Experience</div>
    </div>

    <div id="screen_container">
        <!-- v86 will render the VGA screen here -->
        <div style="white-space: pre; font-family: Courier, monospace; line-height: 14px"></div>
        <canvas style="display: none"></canvas>
    </div>

    <div class="controls">
        <button onclick="window.location.reload()">Reset System</button>
        <button onclick="window.open('https://github.com/BSIT-338/project-OS', '_blank')">View Source</button>
    </div>

    <div class="status" id="status">Status: Waiting for initialization...</div>

    <!-- v86 Emulator Library -->
    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <script>
        window.onload = function() {
            var status = document.getElementById("status");
            status.innerText = "Status: Initializing Emulator...";

            var emulator = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: 256 * 1024 * 1024,
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                cdrom: { url: "build/os.iso" }, /* Link to your ISO */
                autostart: true,
            });

            status.innerText = "Status: System Booting...";
        };
    </script>
</body>
</html>
