<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarlnuxOS | Browser Demo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ffcc;
            --terminal-bg: #000;
        }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }
        h1 {
            color: var(--accent-color);
            letter-spacing: 2px;
            margin: 0;
            font-size: 1.5rem;
        }
        .subtitle {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        #screen_container {
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            background: var(--terminal-bg);
            padding: 5px;
            border-radius: 8px;
            position: relative;
            max-width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        canvas {
            display: block;
            max-width: 100% !important;
            height: auto !important;
            image-rendering: -moz-crisp-edges;
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }
        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 1rem;
            touch-action: manipulation;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }
        button:hover {
            background: var(--accent-color);
            color: #000;
        }
        .status {
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #555;
            text-align: center;
        }
        /* Mobile Keyboard Helper */
        #mobile_input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        @media (max-width: 800px) {
            body {
                padding: 10px 0;
                justify-content: flex-start;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .subtitle {
                display: none;
            }
            #screen_container {
                border-left: none;
                border-right: none;
                border-radius: 0;
                padding: 0;
                width: 100vw;
            }
            .controls {
                padding: 0 10px;
                box-sizing: border-box;
                gap: 5px;
            }
            button {
                padding: 10px;
                font-size: 0.85rem;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EARLNUX OS</h1>
        <div class="subtitle">v1.0.0 "Prism" | Online Browser Experience</div>
    </div>

    <div id="screen_container" onclick="focusMobile()">
        <!-- v86 will render the VGA screen here -->
        <div style="white-space: pre; font-family: Courier, monospace; line-height: 14px"></div>
        <canvas style="display: none"></canvas>
    </div>

    <!-- Hidden input to trigger mobile keyboard -->
    <input type="text" id="mobile_input" autocomplete="off" autocapitalize="none" spellcheck="false">

    <div class="controls">
        <button onclick="window.location.reload()">Reset System</button>
        <button onclick="copyConsole()">Copy Console</button>
        <button onclick="downloadISO()">Download ISO</button>
        <button onclick="window.open('https://github.com/BSIT-338/project-OS', '_blank')">GitHub</button>
    </div>

    <div class="status" id="status">Status: Waiting for initialization...</div>

    <script>
        var emulator = null;

        function downloadISO() {
            window.open('build/os.iso', '_blank');
        }

        function copyConsole() {
            if (!emulator) return;
            // v86 provides a text screen buffer
            const text = emulator.get_text_screen().join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById("status");
                const oldText = status.innerText;
                status.innerText = "Status: Terminal text copied to clipboard!";
                setTimeout(() => status.innerText = oldText, 2000);
            });
        }

        function focusMobile() {
            document.getElementById("mobile_input").focus();
        }

        function v86_loaded() {
            var status = document.getElementById("status");
            if (status) status.innerText = "Status: Engine Loaded. Searching for Hardware Starter...";
            
            setTimeout(function() {
                var starter = null;
                if (typeof window.V86Starter === "function") starter = window.V86Starter;
                else if (typeof window.V86 === "function") starter = window.V86;
                else if (window.v86 && typeof window.v86.V86Starter === "function") starter = window.v86.V86Starter;
                else if (window.V86 && typeof window.V86.V86Starter === "function") starter = window.V86.V86Starter;
                else if (typeof V86Starter === "function") starter = V86Starter;
                
                if (starter) {
                    status.innerText = "Status: Hardware Starter Found. Initializing...";
                    initEmulator(starter);
                } else {
                    status.innerText = "Critical Error: Emulator engine loaded but could not be initialized.";
                }
            }, 200);
        }

        function v86_error() {
            var status = document.getElementById("status");
            if (status) status.innerHTML = "Critical Error: Could not load the emulator engine.";
        }

        function initEmulator(Starter) {
            var status = document.getElementById("status");
            
            var settings = {
                wasm_path: "https://cdn.jsdelivr.net/npm/v86/build/v86.wasm",
                memory_size: 128 * 1024 * 1024,
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                bios: { url: "https://cdn.jsdelivr.net/npm/v86/bios/seabios.bin" },
                vga_bios: { url: "https://cdn.jsdelivr.net/npm/v86/bios/vgabios.bin" },
                cdrom: { url: "build/os.iso" },
                autostart: true,
            };

            try {
                emulator = new Starter(settings);
                
                emulator.add_listener("emulator-ready", function() {
                    status.innerText = "Status: Hardware Ready. Booting EarlnuxOS...";
                });

                emulator.add_listener("download-progress", function(e) {
                    status.innerText = "Status: Downloading " + e.file_name + " (" + Math.round(e.loaded/e.total*100) + "%)";
                });

                emulator.add_listener("download-error", function(e) {
                    status.innerText = "Error: Failed to load " + e.file_name + ". Verify the file exists in build/ folder!";
                });

            } catch (e) {
                status.innerText = "Critical Error: " + e.message;
            }
        }
    </script>

    <!-- v86 Emulator Library - Using verified NPM mirror -->
    <script id="v86_script" src="https://cdn.jsdelivr.net/npm/v86/build/libv86.js" onload="v86_loaded()" onerror="v86_error()"></script>
</body>
</html>
